services:
  postgres:
    image: postgres:16-alpine
    container_name: safe_eye_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-safe_eye}
      POSTGRES_USER: ${POSTGRES_USER:-bg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bg_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bg_user} -d ${POSTGRES_DB:-safe_eye}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safe_eye_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-safe_eye}; Username=${POSTGRES_USER:-bg_user};Password=${POSTGRES_PASSWORD:-bg_secret}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-SafeEyeAPI}
      Jwt__Audience: ${JWT_AUDIENCE:-SafeEyeClients}
      Firebase__CredentialsPath: ${FIREBASE_CREDENTIALS_PATH:-}
      Firebase__RealtimeDatabaseUrl: ${FIREBASE_RTDB_URL:-}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
